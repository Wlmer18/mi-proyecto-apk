name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          # El contenedor ya tiene los permisos necesarios, 
          # solo necesitamos ejecutar el build directamente.
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiAppAPK
          path: bin/*.apk
