name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          # Damos permisos totales a la carpeta para evitar errores de escritura
          chmod -R 777 .
          # Ejecutamos el build forzando la respuesta 'y' para el modo root
          yes y | buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiAppAPK
          path: bin/*.apk
