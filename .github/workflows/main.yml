name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential

      - name: Build with Buildozer
        run: |
          rm -rf .buildozer
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython
          # Ejecutamos buildozer
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Debug - List all files
        if: always()
        run: |
          echo "Contenido de la carpeta actual:"
          ls -R
