name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Dependencias esenciales corregidas para Ubuntu 24.04
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential
          
      - name: Build with Buildozer
        run: |
          # Borrado total para evitar conflictos de versiones previas
          rm -rf .buildozer
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython
          # Ejecutar build
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
