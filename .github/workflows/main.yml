name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          rm -rf .buildozer
          # Añadimos --no-cleanup para ver si ayuda a mantener la estabilidad
          yes y | buildozer -v android debug --no-cleanup
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiAppAPK
          path: bin/*.apk 
