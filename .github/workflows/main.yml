name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          # Limpiamos el rastro de intentos anteriores
          rm -rf .buildozer
          # Ejecutamos con el log nivel 2 para ver qué ocurre realmente
          yes y | buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiAppAPK
          path: bin/*.apk
