name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          # Instalamos dependencias necesarias para que el compilador no falle
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential
          
          # Limpiamos caché previo
          rm -rf .buildozer
          
          # Instalamos buildozer
          pip3 install --user --upgrade buildozer
          
          # Ejecutamos con --no-cleanup para que no borre nada si algo falla
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiAppAPK
          path: bin/*.apk
